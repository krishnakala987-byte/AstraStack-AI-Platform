version: "3.9"

services:

  postgres-db:
    image: postgres:17

    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: astra

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis-cache:
    image: redis:7

    container_name: redis-cache

    ports:
      - "6379:6379"

  auth-service:
    build: ./apps/auth-service

    container_name: auth-service

    ports:
      - "3000:3000"

    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: astra
      JWT_SECRET: mysecretkey

    depends_on:
      - postgres-db
      - redis-cache

  api-gateway:
    build: ./apps/api-gateway

    container_name: api-gateway

    ports:
      - "8080:8080"

    depends_on:
      - auth-service

  ai-ops-service:
    build: ./apps/ai-ops-service

    container_name: ai-ops-service

    ports:
      - "4000:4000"

    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3001:3000"

volumes:
  postgres-data: